services:
  app:
    volumes: !override
      - app_code:/var/www/app
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  nginx:
    volumes: !override
      - app_code:/var/www/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./var/log/nginx:/var/log/nginx
      - frontend_dist:/var/www/app/frontend/dist
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  supervisor:
    volumes: !override
      - app_code:/var/www/app
      - ./docker/php/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  database:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  memcached:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  frontend:
    profiles:
      - dev-only

volumes:
  app_code:
