# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
imports:
    - { resource: 'components/common.yaml' }
    - { resource: 'components/telegram.yaml' }
    - { resource: 'components/admin.yaml' }

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.env: '%env(APP_ENV)%'
    app.name: '%env(APP_NAME)%'
    app.version: '%env(APP_VERSION)%'
    app.secret: '%env(APP_SECRET)%'
    scheduler.timezone: 'UTC'
services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $botName: '%telegram.bot_name%'
            string $botToken: '%telegram.bot_token%'
            string $apiUrl: '%telegram.api_url%'
            string $appSecret: '%app.secret%'
            string $adminPanelBaseUrl: '%admin.panel.base_url%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Kernel.php'
            - '../src/Component/*/*/Entity/'
            - '../src/Component/*/*/UseCase/'
            - '../src/Component/*/*/ValueObject/'
            - '../src/Domain/*/Entity/'
            - '../src/Domain/*/Enum/'
            - '../src/Domain/*/ValueObject/'
            - '../src/Application/Command/'
            - '../src/Infrastructure/Metrics/RequestMetrics.php'

    App\Application\Handler\:
        resource: '../src/Application/Handler'
        public: true

    App\Infrastructure\Telegram\Routing\Router:
        arguments:
            $botName: '%telegram.bot_name%'
            $registries: !tagged_iterator 'app.route_registry'

    App\Infrastructure\Telegram\Middleware\DeduplicationMiddleware:
        arguments:
            $cache: '@cache.telegram'

    App\Infrastructure\Telegram\Middleware\MiddlewareManager:
        arguments:
            $middlewares:
                - '@App\Infrastructure\Telegram\Middleware\DeduplicationMiddleware'

    App\Infrastructure\Telegram\Service\RateLimiterService:
        arguments:
            $banInitiationLimiter: '@limiter.ban_initiation'
            $votingLimiter: '@limiter.voting'

    App\Domain\Telegram\Service\ChatConfigServiceInterface:
        alias: App\Domain\Telegram\Service\ChatConfigService

    App\Domain\Telegram\Service\TelegramApiServiceInterface:
        alias: App\Infrastructure\Telegram\Service\TelegramApiService

    App\Domain\Telegram\Service\TelegramChatMemberApiInterface:
        alias: App\Infrastructure\Telegram\Service\TelegramApiService

    App\Domain\Telegram\Service\TelegramMessageApiInterface:
        alias: App\Infrastructure\Telegram\Service\TelegramApiService

    App\Domain\Telegram\Service\TelegramWebhookApiInterface:
        alias: App\Infrastructure\Telegram\Service\TelegramApiService

    App\Domain\Telegram\Service\BanProcessServiceInterface:
        alias: App\Domain\Telegram\Service\BanProcessService

    App\Domain\Telegram\Service\BanServiceInterface:
        alias: App\Domain\Telegram\Service\BanService

    App\Domain\Telegram\Service\VoteServiceInterface:
        alias: App\Domain\Telegram\Service\VoteService

    App\Domain\Telegram\Service\BanMessageFormatterInterface:
        alias: App\Domain\Telegram\Service\BanMessageFormatter

    App\Domain\Telegram\Service\SpammerMessageServiceInterface:
        alias: App\Domain\Telegram\Service\SpammerMessageService

    App\Domain\Telegram\Service\TrustServiceInterface:
        alias: App\Domain\Telegram\Service\TrustService

    App\Domain\Telegram\Service\UserPersisterInterface:
        alias: App\Domain\Telegram\Service\UserPersister

    App\Domain\Telegram\Service\ChatPersisterInterface:
        alias: App\Domain\Telegram\Service\ChatPersister

    App\Domain\Telegram\Service\HistoryServiceInterface:
        alias: App\Domain\Telegram\Service\HistoryService

    App\Domain\Telegram\Service\BanMessageCleanupServiceInterface:
        alias: App\Domain\Telegram\Service\BanMessageCleanupService
